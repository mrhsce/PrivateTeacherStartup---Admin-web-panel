<div *ngIf="report.Teacher.Id" style="display: flex; margin-bottom: 30px;">
    <div class="iy-regular" style="margin: 0 auto">
        {{report.Teacher.Id}}
    </div>
    <div class="iy-regular" style="margin: 0 auto">
        {{report.Teacher.Name}}
    </div>
    <div class="iy-regular" style="margin: 0 auto">
        {{report.Teacher.Family}}
    </div>

</div>

<div *ngIf="report.Student.Id" style="display: flex; margin-bottom: 30px;">
    <div class="iy-regular" style="margin: 0 auto">
        {{report.Student.Id}}
    </div>
    <div class="iy-regular" style="margin: 0 auto">
        {{report.Student.Name}}
    </div>
    <div class="iy-regular" style="margin: 0 auto">
        {{report.Student.Family}}
    </div>

</div>

<div style="display: flex; flex-direction: row; justify-content: flex-start; align-items: center; ">
    <div class="iy-regular" style="flex: 1; text-align: center;">
        {{report.Dscr}}
    </div>
</div>
